name: Nix

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Cachix
        if: github.repository == 'WooliSoft/gomo'
        uses: cachix/cachix-action@v17
        with:
          name: gomo
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure Cachix read-only
        if: github.repository != 'WooliSoft/gomo'
        uses: cachix/cachix-action@v17
        with:
          name: gomo
          skipPush: true

      - name: Check flake
        run: nix flake check -L

      - name: Build gomo
        run: nix build .#gomo -L --no-link

      - name: Verify app
        run: nix run .#gomo -- --help
